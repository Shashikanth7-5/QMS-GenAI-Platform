<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>QMS GenAI · Not Authorised</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'Inter',sans-serif;background:#f1f5f9;
      display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
    .card{background:#fff;border-radius:16px;padding:40px;max-width:420px;text-align:center;
      box-shadow:0 4px 24px rgba(0,0,0,.1);}
    h1{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:8px;}
    p{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:8px;}
    .role-note{font-size:12px;color:#94a3b8;margin-bottom:24px;}
    .btn{display:inline-block;padding:10px 24px;background:#1756b8;
      color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;margin:4px;}
    .btn:hover{background:#1d4ed8;}
    .btn--sec{background:#f1f5f9;color:#334155;}
    .btn--sec:hover{background:#e2e8f0;}
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:48px;margin-bottom:16px;">🔒</div>
    <h1>Not Authorised</h1>
    <p>You don't have permission to access this page.</p>
    <p class="role-note">
      If you believe this is an error, contact your system administrator
      or request a role change.
    </p>
    <a href="/" class="btn">← Back to Dashboard</a>
    <a href="/logout" class="btn btn--sec">Sign out</a>
  </div>
</body>
</html>
